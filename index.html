<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bookmark Saver</title>

    <!-- Linking CSS Files -->

    <!-- This file conatins the main css of the body etc -->
    <link rel="stylesheet" href="CSS/style.css">

    <!-- This file conatines of css code for bookmark container -->
    <link rel="stylesheet" href="CSS/bookmarkConatiner.css">

</head>

<body>

    <div id="bookmarkConatiner">

        <!-- Heading -->
        <h1 id="heading">Bookmark Saver</h1>

        <!-- Bookmark Name -->
        <input class="inputFields" type="text" placeholder="Bookmark Name">

        <!-- Bookmark Url -->
        <input class="inputFields" type="text" placeholder="Bookmark Url">

        <!-- Add Bookmark Button -->
        <button id="addBookmarkBtn">Add Bookmark</button>

        <!-- The Futher is all sample code , it will be deleted afterwards -->
        <div class="bookmarkItemCard">
            <a class="bookmarkLink" href="https://www.google.com" target="_main">Google</a>
            <button class="removeBookmarkButton">Remove</button>
        </div>

    </div>
    
</body>

</html>
